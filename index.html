<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="author" content="Weiyu Yin">
    <meta name="description" content="My Fun Fakebook">
    <meta name="keywords" content="javascript">
    <link rel="icon" href="./assets/media/icon.JPG" type="image/x-icon">
    <link rel="stylesheet" href="./assets/styles/index.css">
    <script type="module" src="./assets/script/app.js"></script>

    <title>Fakebook</title>
</head>

<body>
    <header class="page-header">
        <div class="container flex">
            <div class="logo">
                <h1>Fakebook</h1>
            </div>
            <div class="nav-list">
                <nav>
                    <ul class="flex content ">
                        <li><a href="#">Friends</a></li>
                        <li><a href="#">Pages</a></li>
                        <li><a href="#">Groups</a></li>
                        <li><a href="#">My ads</a></li>
                        <li><a href="#">Settings</a></li>
                    </ul>
                </nav>
            </div>
            <div class="user-info content">
                <figure>
                    <img src="./assets/media/weiyu.jpg" class="profile" id="profile">
                </figure>
            </div>
        </div>
    </header>
    <main class="content">
        <div class="modal" id="modal"></div>
        <div class="overlay"></div>
        <div class="container">
            <div class="input-text">
                <form class="post-input">
                    <textarea placeholder="What's new, Weiyu?"></textarea>
                    <div class="flex space-between">
                        <div class="flex">
                            <label for="file-input">
                                <img src="./assets/media/imageicon.png" width="28" height="28">
                            </label>
                            <input type="file" id="file-input" accept="image/*" class="post-image">
                            <p class="file-info"></p>
                        </div>
                        <div>
                            <input type="button" class="post" value="Post">
                        </div>
                    </div>
                </form>
            </div>
            <section class="show-post">
            </section>
        </div>
    </main>
</body>

</html>
